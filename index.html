<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASX &amp; TSX no Brasil — Mapa de Mineração</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header class="sidebar-header">
        <div class="brand">
          <img src="assets/nexial-logo.png" alt="Nexial Partners" />
        </div>
        <h1>ASX &amp; TSX <span>no Brasil</span></h1>
        <p class="subtitle">Empresas das bolsas ASX, TSX e TSX.V com projetos de mineração no Brasil</p>
      </header>

      <div class="controls">
        <input type="search" id="search" placeholder="Buscar empresa, projeto ou ticker…" autocomplete="off" />
        <select id="exchangeFilter" aria-label="Filtrar por bolsa">
          <option value="">Todas as bolsas</option>
        </select>
        <div class="filter-row">
          <select id="commodityFilter" aria-label="Filtrar por commodity">
            <option value="">Todas as commodities</option>
          </select>
          <select id="stateFilter" aria-label="Filtrar por estado">
            <option value="">Todos os estados</option>
          </select>
        </div>
        <label class="tenements-toggle">
          <input type="checkbox" id="tenementsToggle" checked />
          <span class="ten-dot"></span>
          Áreas Atlântica Minas (<span id="tenementsCount">…</span>)
          <button type="button" id="tenementsFocus" title="Centralizar o mapa nas áreas">focar</button>
        </label>
      </div>

      <div class="stats" id="stats"></div>

      <ul id="companyList" class="company-list"></ul>

      <footer class="sidebar-footer">
        <p id="metaSource"></p>
        <p class="disclaimer" id="metaDisclaimer"></p>
      </footer>
    </aside>

    <main id="mapWrap">
      <div id="map"></div>
      <div id="legend" class="legend"></div>
    </main>
  </div>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>

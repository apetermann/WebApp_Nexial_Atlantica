<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Áreas Atlântica Minas e Empresas Listadas — Mapa de Mineração</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="styles.css?v=9" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header class="sidebar-header">
        <div class="brand">
          <img src="assets/atlantica-logo.png" alt="Atlântica Minas" class="brand-atlantica" />
          <div class="brand-sep"></div>
          <img src="assets/nexial-logo.png" alt="Nexial Partners" class="brand-nexial" />
        </div>
        <h1>Áreas Atlântica Minas <span>e Empresas Listadas</span></h1>
        <p class="subtitle">Áreas da Atlântica Minas e empresas de mineração listadas em ASX, TSX, TSX.V e Nasdaq com projetos no Brasil</p>
      </header>

      <div class="controls">
        <input type="search" id="search" placeholder="Buscar empresa, projeto ou ticker…" autocomplete="off" />

        <div class="layer-group">
          <label class="layer-toggle">
            <input type="checkbox" id="companiesToggle" checked />
            <b>Empresas</b>&nbsp;(<span id="companiesCount">…</span>)
          </label>
          <select id="exchangeFilter" aria-label="Filtrar por bolsa">
            <option value="">Todas as bolsas</option>
          </select>
          <div class="filter-row">
            <select id="commodityFilter" aria-label="Filtrar por commodity">
              <option value="">Todas as commodities</option>
            </select>
            <select id="stateFilter" aria-label="Filtrar por estado">
              <option value="">Todos os estados</option>
            </select>
          </div>
        </div>

        <div class="layer-group">
          <label class="layer-toggle">
            <input type="checkbox" id="tenementsToggle" checked />
            <b>Áreas Atlântica Minas</b>&nbsp;(<span id="tenementsCount">…</span>)
            <button type="button" id="tenementsFocus" title="Centralizar o mapa nas áreas">focar</button>
          </label>
          <select id="substanceFilter" aria-label="Filtrar áreas por substância">
            <option value="">Todas as substâncias</option>
          </select>
          <label class="layer-toggle">
            <input type="checkbox" id="tenements2Toggle" checked />
            <span class="ten2-dot"></span>
            <b>Novas Áreas</b>&nbsp;(<span id="tenements2Count">…</span>)
            <button type="button" id="tenements2Focus" title="Centralizar o mapa nas novas áreas">focar</button>
          </label>
        </div>
      </div>

      <div class="stats" id="stats"></div>

      <ul id="companyList" class="company-list"></ul>

      <footer class="sidebar-footer">
        <p id="metaSource"></p>
        <p class="disclaimer" id="quotesAsOf"></p>
        <p class="disclaimer" id="metaDisclaimer"></p>
      </footer>
    </aside>

    <main id="mapWrap">
      <div id="map"></div>
      <div id="legend" class="legend"></div>
    </main>
  </div>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="app.js?v=9"></script>
</body>
</html>
